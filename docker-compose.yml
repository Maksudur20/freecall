# Docker Compose file for local development
version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: freecall-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - freecall-network

  redis:
    image: redis:7-alpine
    container_name: freecall-redis
    ports:
      - "6379:6379"
    networks:
      - freecall-network

  backend:
    build:
      context: ./backend
    container_name: freecall-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/freecall
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_here
      REFRESH_TOKEN_SECRET: your_refresh_secret_here
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - freecall-network

volumes:
  mongodb_data:

networks:
  freecall-network:
    driver: bridge
